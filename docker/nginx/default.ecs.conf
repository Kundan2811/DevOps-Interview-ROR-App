# ECS/Fargate-specific variant of docker/nginx/default.conf
#
# WHY THIS FILE EXISTS:
# In Docker Compose (local dev), containers reach each other by container
# name via Docker's embedded DNS (e.g. "rails_app:3000").
#
# In AWS Fargate's awsvpc network mode, all containers in a single ECS task
# share ONE network interface/IP and must reach each other via "localhost"
# instead - there is no container-name DNS between sibling containers in
# the same task (that's a Docker Compose / bridge-network feature only).
#
# Everything else is identical to docker/nginx/default.conf.

upstream rails_app {
  server localhost:3000;
}

server {
  listen 80;
  server_name _ localhost;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log;

  location ~ /\. {
    deny all;
  }

  location ~* ^.+\.(rb|log)$ {
    deny all;
  }

  location ~ ^/(assets|images|javascripts|stylesheets|swfs|system)/ {
    try_files $uri @rails;
    access_log on;
    gzip_static on;
    expires max;
    add_header Cache-Control public;
    add_header Last-Modified "";
    add_header ETag "";
    break;
  }

  location / {
    try_files $uri @rails;
  }

  location @rails {
    proxy_set_header  X-Real-IP  $remote_addr;
    proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $http_host;
    proxy_redirect off;
    proxy_pass http://rails_app;
  }
}
